<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <link rel="stylesheet" href="../Common/CSS/main.css">
    <link rel="stylesheet" href="CSS/admn_main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <header>
        <nav class="navbar fixed-top">
            <div class="container-fluid">
                <a class="navbar-brand" href="../Customer/index.html">Malcolm Lismore Photography</a>
                <a class="navbar-title position-absolute top-50 start-50 translate-middle" href="admin.html">Admin Dashboard</a>
            </div>
        </nav>
    </header>
    <main>
        <div class="container">
            <section class="tabSection">
                <!-- Tabs -->
                <div class="tab">
                    <button class="tablinks" onclick="openTab(event, 'AllImages')" id="openFirst">All Images</button>
                    <button class="tablinks" onclick="openTab(event, 'Portraits')">Portraits</button>
                    <button class="tablinks" onclick="openTab(event, 'Weddings')">Weddings</button>
                    <button class="tablinks" onclick="openTab(event, 'Events')">Events</button>
                </div>

                <!-- Tab content -->
                <div id="AllImages" class="tabcontent">
                    <div id="allimagesContent" class="grid-container"></div>
                </div>
                <div id="Portraits" class="tabcontent">
                    <div id="portraitsContent" class="grid-container"></div>
                </div>
                <div id="Weddings" class="tabcontent">
                    <div id="weddingsContent" class="grid-container"></div>
                </div>
                <div id="Events" class="tabcontent">
                    <div id="eventsContent" class="grid-container"></div>
                </div>
            </section>
            
            <div class="main">
                <div class="button-container">
                    <div class="btn-grp">
                        <button class="button button2 float-right delete-image" id="deleteSelectedButton" 
                        onclick="deleteSelectedImages()" disabled>Delete Images</button>
                        <button class="button button1 float-right add-image" id="uploadButton" 
                        onclick="showModal()">Add Images</button>
                    </div>
                </div>
            </div>

            <!-- The Modal -->
            <div id="myModal" class="modal">
                <div class="modal-content">
                    <span class="close">&times;</span>
                    <h2>Upload Image</h2>
                    <form id="uploadForm" enctype="multipart/form-data">
                        <label for="title">Title:</label>
                        <input type="text" id="title" name="title" required><br><br>
                        <label for="gallery">Gallery:</label>
                        <select id="gallery" name="gallery" required>
                            <option value="Portraits">Portraits</option>
                            <option value="Weddings">Weddings</option>
                            <option value="Events">Events</option>
                        </select><br><br>
                        <label for="file">Select image:</label>
                        <input type="file" id="file" name="file" accept="image/*" required><br><br>
                        <input type="submit" value="Upload">
                    </form>
                    <div id="uploadStatus"></div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script> 
    <script src="../Common/JS/script.js"></script>
</body>
</html>
