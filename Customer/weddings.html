    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetchGalleryImages('Weddings');
        });

        function fetchGalleryImages(gallery) {
            fetch('../Common/Config/fetch_images.php?gallery=' + gallery)
                .then(response => response.json())
                .then(images => {
                    const galleryContent = document.getElementById('galleryContent');
                    galleryContent.innerHTML = '';
                    images.forEach(image => {
                        const imgElement = document.createElement('img');
                        imgElement.src = '../Common/images/' + gallery + '/' + image.File_Name;
                        imgElement.alt = image.Title;
                        imgElement.className = 'gallery-image';
                        galleryContent.appendChild(imgElement);
                    });
                })
                .catch(error => console.error('Error fetching images:', error));
        }
    </script>
